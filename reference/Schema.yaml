openapi: 3.1.0
info:
  title: Killua Football GPT Gateway
  version: 3.4.0
  description: Private GPT-facing gateway with premium SportMonks data. Provides fixture browsing, league discovery, data preparation, digest (compact pre-computed analysis in ONE call), bundle (raw data fallback), pack-based reading, market search, and filtered detailed odds (1xBet). Digest endpoint is preferred — always use it first.

servers:
  - url: https://killua-football.vercel.app/api/gpt

security:
  - gptSecret: []

components:
  securitySchemes:
    gptSecret:
      type: apiKey
      in: header
      name: x-gpt-secret

  schemas:
    GenericObject:
      type: object
      description: Flexible object container for gateway responses.
      properties:
        _placeholder:
          type: string
          description: Placeholder property to satisfy Actions schema validation.
      additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
        code:
          type:
            - string
            - "null"
        detail:
          oneOf:
            - type: string
            - type: "null"
            - $ref: "#/components/schemas/GenericObject"
      required:
        - ok
        - error
      additionalProperties: true

    PackName:
      type: string
      enum:
        - fixture_context
        - fixture_squads
        - fixture_events_scores
        - fixture_statistics
        - fixture_periods
        - fixture_xg
        - fixture_predictions
        - fixture_news
        - fixture_expected_lineups
        - fixture_transfer_rumours
        - fixture_commentaries
        - fixture_match_facts
        - h2h_context
        - h2h_events
        - h2h_statistics
        - h2h_referees
        - home_team_all
        - away_team_all
        - referee_all
        - home_team_squad
        - away_team_squad
        - home_team_schedule
        - away_team_schedule
        - home_team_squad_fallback
        - away_team_squad_fallback
        - season_topscorers
        - home_team_rankings
        - away_team_rankings
        - league_standings
        - standings_round
        - standings_corrections
        - standings_live
        - odds_prematch_summary
        - odds_inplay_summary

    BundleResponse:
      type: object
      description: "Multi-part bundle (v3). Part 1 = core match data, Part 2 = context & history. Both include match_summary with ft (final score)."
      properties:
        ok:
          type: boolean
        fixture_id:
          type: integer
        bundle_version:
          type: integer
        total_parts:
          type: integer
          description: "Always 2"
        current_part:
          type: integer
          description: "1 or 2"
        match_summary:
          type: object
          description: "Compact match info. ft = final score (e.g. '1-2'), ht = half-time. ALWAYS use this for correct score."
          properties:
            home_team:
              type: string
            away_team:
              type: string
            ft:
              type: string
              description: "Final score e.g. '1-2'"
            ht:
              type: string
              description: "Half-time score e.g. '0-1'"
            status:
              type: string
            date:
              type: string
              format: date-time
            league:
              type: string
            venue:
              type: string
        notes:
          type: array
          items:
            type: string
        request_id:
          type:
            - string
            - "null"
      required:
        - ok
      additionalProperties: true

    DigestResponse:
      type: object
      description: "Pre-computed analysis digest v2 (~8-15KB). Server extracts ALL key metrics from every data source. GPT reads in ONE call. Zero truncation. 100% bundle parity."
      properties:
        ok:
          type: boolean
        fixture_id:
          type: integer
        digest_version:
          type: integer
          description: "Currently 2"
        match:
          type: object
          description: "Match info. ft = definitive final score. ht = half-time. Includes stage/group for cups."
          properties:
            home:
              type: string
            away:
              type: string
            ft:
              type: string
              description: "Final score e.g. '1-2'"
            ht:
              type: string
              description: "Half-time score e.g. '0-1'"
            status:
              type: string
            league:
              type: string
            season:
              type: string
            round:
              type: string
            stage:
              type: string
            group:
              type: string
            venue:
              type: string
            date:
              type: string
            is_live:
              type: boolean
        aggregate:
          type: object
          description: "Cup ties aggregate: result, home_score, away_score"
        weather:
          $ref: "#/components/schemas/GenericObject"
        tactical:
          type: object
          description: "Formations, XI names, coaches, subs used, top_performers (name, rating, goals, assists, cards, side)"
        sidelined:
          type: object
          description: "Injured/suspended players per team"
        events:
          type: array
          description: "Goals, cards, subs timeline"
          items:
            $ref: "#/components/schemas/GenericObject"
        stats:
          type: object
          description: "Key match stats: possession, shots, xG, corners, fouls, tackles, cards, dangerous_attacks. Each has home/away."
        xg:
          type: object
          description: "Standalone xG if not in stats"
        periods:
          type: object
          description: "1H/2H goal splits per team"
        standings:
          type: object
          description: "League position: pos, pts, W/D/L, GF/GA/GD, form, home_record, away_record, home_goals, away_goals"
        round_standings:
          type: array
          description: "Group stage mini-table: pos, team, pts, p, gd"
          items:
            $ref: "#/components/schemas/GenericObject"
        standings_corrections:
          type: array
          description: "Point deductions affecting teams"
          items:
            $ref: "#/components/schemas/GenericObject"
        live_standings:
          type: object
          description: "Real-time table position (live matches only)"
        h2h:
          type: object
          description: "H2H summary: matches, wins, draws, avg_goals, btts_pct, over25_pct, results"
        h2h_discipline:
          type: object
          description: "H2H deep stats: avg_cards_per_match, avg_possession, avg_shots"
        predictions:
          type: object
          description: "Probabilities and value_bets"
        odds_overview:
          type: object
          description: "Pre-match 1xBet market availability: 1X2, O/U, BTTS, DC, AH"
        inplay_odds_overview:
          type: object
          description: "Inplay odds availability (live matches only)"
        referee:
          type: object
          description: "Referee profile: name, matches, yellowcards_avg, redcards_total, penalties, fouls_avg"
        home_season:
          type: object
          description: "Home team season stats: goals, clean_sheets, W/D/L, btts, over_2_5, avg_corners, avg_cards"
        away_season:
          type: object
          description: "Away team season stats"
        home_squad_depth:
          type: array
          description: "Home top 6 squad contributors: name, pos, apps, goals, assists, rating, injured"
          items:
            $ref: "#/components/schemas/GenericObject"
        away_squad_depth:
          type: array
          description: "Away top 6 squad contributors"
          items:
            $ref: "#/components/schemas/GenericObject"
        rankings:
          type: object
          description: "FIFA/domestic rankings: home/away with position, type, points"
        home_schedule:
          type: object
          description: "Home rest days + next opponent"
        away_schedule:
          type: object
          description: "Away rest days + next opponent"
        news:
          type: array
          items:
            type: string
        match_facts:
          type: array
          items:
            type: string
        commentaries:
          type: array
          description: "Key live match moments (live only): minute, text, is_goal"
          items:
            $ref: "#/components/schemas/GenericObject"
        transfer_rumours:
          type: array
          items:
            type: string
        topscorers:
          type: array
          description: "League top scorers from both teams"
          items:
            $ref: "#/components/schemas/GenericObject"
        expected_lineups:
          type: object
          description: "Pre-match predicted XI availability"
        data_flags:
          type: object
          description: "21 explicit flags: xg, predictions, lineups_confirmed, expected_lineups, odds_prematch, odds_inplay, standings, round_standings, standings_corrections, live_standings, h2h_count, referee_stats, news_count, match_facts, commentaries, team_stats, home_squad, away_squad, home_rankings, away_rankings, topscorers"
        notes:
          type: array
          items:
            type: string
        request_id:
          type:
            - string
            - "null"
      required:
        - ok
      additionalProperties: true

    PrepareResponse:
      type: object
      properties:
        ok:
          type: boolean
        fixture_id:
          type: integer
        discovered:
          $ref: "#/components/schemas/GenericObject"
        match_is_live_like:
          type: boolean
        refresh_policy:
          $ref: "#/components/schemas/GenericObject"
        sync_results:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
        failed_steps:
          type: array
          items:
            type: string
        next:
          $ref: "#/components/schemas/GenericObject"
        request_id:
          type:
            - string
            - "null"
      required:
        - ok
      additionalProperties: true

    ManifestResponse:
      type: object
      properties:
        ok:
          type: boolean
        fixture_id:
          type: integer
        default_mode:
          type: string
        discovered:
          $ref: "#/components/schemas/GenericObject"
        state:
          $ref: "#/components/schemas/GenericObject"
        match_is_live_like:
          type: boolean
        default_read_order:
          type: array
          items:
            $ref: "#/components/schemas/PackName"
        packs:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
        analysis_blueprint:
          $ref: "#/components/schemas/GenericObject"
        coverage:
          $ref: "#/components/schemas/GenericObject"
        notes:
          type: array
          items:
            type: string
        request_id:
          type:
            - string
            - "null"
      required:
        - ok
      additionalProperties: true

    PackResponse:
      type: object
      properties:
        ok:
          type: boolean
        fixture_id:
          type: integer
        pack:
          $ref: "#/components/schemas/PackName"
        family:
          type: string
        label:
          type: string
        contains:
          type: array
          items:
            type: string
        analysis_focus:
          type: array
          items:
            type: string
        read_mode:
          type:
            - string
            - "null"
        safe_read:
          $ref: "#/components/schemas/GenericObject"
        paging:
          $ref: "#/components/schemas/GenericObject"
        coverage:
          $ref: "#/components/schemas/GenericObject"
        data:
          $ref: "#/components/schemas/GenericObject"
        request_id:
          type:
            - string
            - "null"
      required:
        - ok
      additionalProperties: true

    MarketItem:
      type: object
      properties:
        market_id:
          type: integer
        name:
          type:
            - string
            - "null"
        developer_name:
          type:
            - string
            - "null"
        legacy_id:
          type:
            - integer
            - "null"
        has_winning_calculations:
          type:
            - boolean
            - "null"
      required:
        - market_id
      additionalProperties: true

    MarketSearchResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type:
            - integer
            - "null"
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketItem"
        request_id:
          type:
            - string
            - "null"
      required:
        - ok
      additionalProperties: true

    FixtureOddsMarket:
      type: object
      properties:
        market_id:
          type: integer
        market_name:
          type:
            - string
            - "null"
        developer_name:
          type:
            - string
            - "null"
        legacy_id:
          type:
            - integer
            - "null"
        has_winning_calculations:
          type:
            - boolean
            - "null"
        market_description:
          type:
            - string
            - "null"
        odds_count:
          type:
            - integer
            - "null"
        fetched_at:
          type:
            - string
            - "null"
        odds:
          oneOf:
            - type: array
              items:
                $ref: "#/components/schemas/GenericObject"
            - type: "null"
      required:
        - market_id
      additionalProperties: true

    FixtureOddsResponse:
      type: object
      properties:
        ok:
          type: boolean
        fixture_id:
          type: integer
        mode:
          type: string
          enum:
            - prematch
            - inplay
        market_ids:
          oneOf:
            - type: array
              items:
                type: integer
            - type: "null"
        markets_available:
          type:
            - integer
            - "null"
        markets_found:
          type:
            - integer
            - "null"
        usage_hint:
          type:
            - string
            - "null"
        data:
          type: array
          items:
            $ref: "#/components/schemas/FixtureOddsMarket"
        request_id:
          type:
            - string
            - "null"
      required:
        - ok
      additionalProperties: true

paths:
  /fixtures:
    get:
      operationId: listFixtures
      summary: Browse upcoming, live, or recent fixtures from the watchlist
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - upcoming
              - live
              - recent
            default: upcoming
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by team name or league name
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: List of matching fixtures
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  request_id:
                    type:
                      - string
                      - "null"
                  status_filter:
                    type: string
                  search:
                    type:
                      - string
                      - "null"
                  total:
                    type: integer
                  fixtures:
                    type: array
                    items:
                      type: object
                      properties:
                        fixture_id:
                          type: integer
                        home_team:
                          type: string
                        away_team:
                          type: string
                        league:
                          type: string
                        season:
                          type:
                            - string
                            - "null"
                        starts_at:
                          type:
                            - string
                            - "null"
                          format: date-time
                        match_state:
                          type:
                            - string
                            - "null"
                        is_live:
                          type: boolean
                        data_ready:
                          type: boolean
                      required:
                        - fixture_id
                      additionalProperties: true
                required:
                  - ok
                additionalProperties: true
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leagues:
    get:
      operationId: listLeagues
      summary: Browse leagues with upcoming fixtures in the watchlist
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by league name
      responses:
        "200":
          description: List of leagues with fixture counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  request_id:
                    type:
                      - string
                      - "null"
                  total:
                    type: integer
                  leagues:
                    type: array
                    items:
                      type: object
                      properties:
                        league_id:
                          type: integer
                        league_name:
                          type:
                            - string
                            - "null"
                        season_name:
                          type:
                            - string
                            - "null"
                        fixture_count:
                          type: integer
                        next_kickoff:
                          type:
                            - string
                            - "null"
                          format: date-time
                      required:
                        - league_id
                      additionalProperties: true
                required:
                  - ok
                additionalProperties: true
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fixtures/{fixtureId}/prepare:
    post:
      operationId: prepareFixtureAnalysis
      summary: Sync all analysis data for a fixture including premium data (xG, predictions, news, expected lineups, league standings)
      parameters:
        - name: fixtureId
          in: path
          required: true
          schema:
            type: integer
        - name: h2h_limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 20
        - name: refresh_mode
          in: query
          required: false
          schema:
            type: string
            enum:
              - swr
              - fresh_if_stale
              - force_fresh
            default: fresh_if_stale
        - name: live_refresh_mode
          in: query
          required: false
          schema:
            type: string
            enum:
              - swr
              - fresh_if_stale
              - force_fresh
            default: fresh_if_stale
      responses:
        "200":
          description: Fixture preparation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrepareResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fixtures/{fixtureId}/bundle:
    get:
      operationId: getFixtureAnalysisBundle
      summary: "Get analysis data in 2 parts. Part 1: core match data. Part 2: context & history. ALWAYS read both parts."
      parameters:
        - name: fixtureId
          in: path
          required: true
          schema:
            type: integer
        - name: part
          in: query
          required: false
          schema:
            type: integer
            enum: [1, 2]
            default: 1
          description: "Part 1 = lineups, events, stats, xG, predictions, odds. Part 2 = H2H, standings, team stats, news, commentaries."
      responses:
        "200":
          description: Bundle part with match_summary (ft = final score, ht = half-time)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fixtures/{fixtureId}/manifest:
    get:
      operationId: getFixtureAnalysisManifest
      summary: Get discovered IDs, ready packs, default read order, and safe-read guidance
      parameters:
        - name: fixtureId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fixtures/{fixtureId}/packs/{pack}:
    get:
      operationId: getFixtureAnalysisPack
      summary: Read one analysis pack for a fixture
      parameters:
        - name: fixtureId
          in: path
          required: true
          schema:
            type: integer
        - name: pack
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackName"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 20
        - name: read_mode
          in: query
          required: false
          schema:
            type: string
            enum:
              - full
              - safe
            default: full
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 400
      responses:
        "200":
          description: Pack payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Missing pack data or missing discovered actors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /markets:
    get:
      operationId: searchMarkets
      summary: Search available betting markets by keyword
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
            description: Keyword search such as fulltime, double chance, over under, btts, asian handicap
      responses:
        "200":
          description: Matching market definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSearchResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fixtures/{fixtureId}/odds/pre-match:
    get:
      operationId: getFixturePrematchOdds
      summary: Read prematch odds summary or filtered detailed odds for selected market ids
      parameters:
        - name: fixtureId
          in: path
          required: true
          schema:
            type: integer
        - name: market_ids
          in: query
          required: false
          schema:
            type: string
            description: Comma-separated market ids, for example 1,2,5
        - name: filter
          in: query
          required: false
          schema:
            type: string
            description: Filter syntax, for example market:1,2,5
      responses:
        "200":
          description: Prematch odds payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixtureOddsResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Missing odds data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fixtures/{fixtureId}/odds/inplay:
    get:
      operationId: getFixtureInplayOdds
      summary: Read inplay odds summary or filtered detailed odds for selected market ids
      parameters:
        - name: fixtureId
          in: path
          required: true
          schema:
            type: integer
        - name: market_ids
          in: query
          required: false
          schema:
            type: string
            description: Comma-separated market ids, for example 1,2,5
        - name: filter
          in: query
          required: false
          schema:
            type: string
            description: Filter syntax, for example market:1,2,5
      responses:
        "200":
          description: Inplay odds payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixtureOddsResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
